name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: zircon-server_arm64-apple-darwin.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: zircon-server_x86_64-apple-darwin.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: zircon-server_x86_64-unknown-linux-musl.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: zircon-server_arm64-unknown-linux-musl.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked

      - name: Build (macOS)
        if: contains(matrix.target, 'apple')
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/zircon-server/Cargo.toml

      - name: Build (Linux)
        if: contains(matrix.target, 'linux')
        run: cross build --release --target ${{ matrix.target }} --manifest-path crates/zircon-server/Cargo.toml

      - name: Compress binary
        run: gzip -c crates/zircon-server/target/${{ matrix.target }}/release/zircon-server > ${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
