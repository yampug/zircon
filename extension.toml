id = "zircon"
name = "Zircon for Crystal"
version = "0.0.1"
schema_version = 1
authors = ["Bob"]
description = "Crystal language support for Zed"
repository = "https://github.com/nook/zed-crystal"
languages = ["languages/crystal"]

[lib]
kind = "Rust"
version = "0.7.0"

[slash_commands.crystal-expand]
description = "Expand Crystal macros using `crystal tool expand`"
requires_argument = true

[slash_commands.crystal-check]
description = "Run Crystal compiler type check and report Nil-risk diagnostics"
requires_argument = true

[slash_commands.crystal-spec]
description = "Run Crystal specs and show inline failure annotations with expected/actual diffs"
requires_argument = false

[language_servers.zircon]
name = "Zircon"
languages = ["Crystal"]

[language_servers.zircon.language_ids]
Crystal = "crystal"

[grammars.crystal]
repository = "https://github.com/crystal-lang-tools/tree-sitter-crystal"
commit = "50ca9e6fcfb16a2cbcad59203cfd8ad650e25c49"
